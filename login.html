<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="css/login.css">
</head>

<body>



    <div class="logoInicio">
        
        
       
        <a href="index.html">
             <img src="img/menulogo.png" alt="Inicio">
            Inicio 
        </a>
    </div>
    <div class="login-box">
        
        <img class="avatar" src="img/muñequitoMonroll.png" alt="logo">
        <h1>Inicio de sesion</h1>
        <form id="formLogin">
            <label for="username">Usuario</label>
            <input type="text" id="usuario" placeholder="Ingrese su usuario" required>

            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Ingrese su contraseña" required>

            <button type="submit" id="logIn">Iniciar sesion</button>

            <a href="">¿Olvidaste tu contraseña?</a><br>
            <a href="">Crear una cuenta</a>
        </form>
    </div>
    
    <script src="js/login.js"></script>

</body>
</html>
